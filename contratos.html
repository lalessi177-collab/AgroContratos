<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Contratos — Estanar S.A.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
.container{max-width:1000px;margin:0 auto;border:1px solid #ddd;border-radius:12px;overflow:hidden;background:#fff}
.header{background:#1B4332;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:16px}
.logo-box{display:flex;flex-direction:column;align-items:center;border:2px solid rgba(255,255,255,0.7);padding:4px 10px;border-radius:4px;min-width:64px}
.logo-name{color:#fff;font-size:15px;font-weight:500;letter-spacing:.08em}
.logo-sub{color:#a3c9a8;font-size:10px;letter-spacing:.12em}
.header-title h1{font-size:15px;font-weight:500;color:#fff}
.header-title p{font-size:11px;color:#a3c9a8;margin-top:2px}
.btn-w{padding:4px 10px;font-size:11px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;height:26px;white-space:nowrap;background:#fff;color:#1B4332;border:none;font-weight:500}
.btn-w:hover{background:#d4edda}
.wrap{padding:1rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:#f5f5f3;border-radius:8px;padding:10px 14px}
.stat .label{font-size:11px;color:#666;margin-bottom:4px}
.stat .value{font-size:18px;font-weight:500}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center}
.toolbar input,.toolbar select{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;height:34px}
.toolbar input{flex:1;min-width:140px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#1B4332}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.card-title{font-size:13px;font-weight:600;color:#1a1a1a}
.card-sub{font-size:11px;color:#666;margin-top:2px;line-height:1.4}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-gray{background:#f0f0f0;color:#666}
.progress-wrap{margin-bottom:7px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:3px}
.progress-label .val{font-weight:500;color:#1a1a1a}
.progress-track{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px}
.bar-ent{background:#1B4332}
.bar-liq{background:#639922}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:#666;border-top:1px solid #f0f0f0;padding-top:8px;gap:8px;flex-wrap:wrap}
.no-data{padding:2rem;text-align:center;color:#888;font-size:13px}
.loading{padding:2rem;text-align:center;color:#888;font-size:13px}
.error-box{padding:1rem;background:#FCEBEB;border-radius:8px;color:#791F1F;font-size:13px;margin-bottom:1rem;border:1px solid #F7C1C1}
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 10px;flex-wrap:wrap;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#5DCAA5}
.dot-amber{background:#E8B84B}
.dot-red{background:#E24B4A}
@media print{
  body{background:#fff;padding:0}
  .toolbar,.btn-w{display:none}
  .container{border:none;border-radius:0}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo-box">
        <span class="logo-name">ESTANAR</span>
        <span class="logo-sub">S.A.</span>
      </div>
      <div class="header-title">
        <h1>Contratos de venta de granos</h1>
        <p id="sync-status"><span class="dot dot-amber"></span>Conectando con Finn...</p>
      </div>
    </div>
    <button class="btn-w" onclick="cargar()"><i class="ti ti-refresh"></i> Actualizar</button>
  </div>

  <div class="wrap">
    <div id="errorBox" style="display:none" class="error-box"></div>
    <div class="stats" id="statsBar" style="display:none"></div>
    <div class="toolbar" id="toolbarWrap" style="display:none">
      <input type="text" id="buscar" placeholder="Buscar contrato, comprador..." oninput="filtrar()">
      <select id="filtroProducto" onchange="filtrar()"><option value="">Todos los productos</option></select>
      <select id="filtroTipo" onchange="filtrar()">
        <option value="">Todos los tipos</option>
        <option value="Contra Entrega">Contra Entrega</option>
        <option value="A Fijar Precio">A Fijar Precio</option>
        <option value="A Fijar Precio y Cantidad">A Fijar Precio y Cantidad</option>
      </select>
      <select id="filtroMoneda" onchange="filtrar()">
        <option value="">Todas las monedas</option>
        <option value="DOLARES">Dólares</option>
        <option value="PESOS">Pesos</option>
      </select>
    </div>
    <div id="contenido"><div class="loading"><i class="ti ti-loader"></i> Cargando contratos...</div></div>
    <div class="bottom-bar">
      <p style="font-size:11px;color:#999" id="contadorInfo"></p>
      <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:#999">
        Desarrollado por
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44" style="height:17px;vertical-align:middle">
          <circle cx="14" cy="14" r="7" fill="#E8B84B"/>
          <circle cx="30" cy="14" r="9" fill="#1a1a1a"/>
          <line x1="14" y1="14" x2="30" y2="14" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="22" cy="30" r="9" fill="#1a1a1a"/>
          <circle cx="38" cy="30" r="7" fill="#E8B84B"/>
          <line x1="30" y1="14" x2="22" y2="30" stroke="#1a1a1a" stroke-width="2"/>
          <text x="48" y="34" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#1a1a1a">L5A.IO</text>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://billowing-bonus-a91f.lalessi177.workers.dev/';
let allData = [];
let filteredData = [];

function fmt(n){return n==null?'-':Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});}
function pct(a,b){return b>0?Math.min(100,Math.round(a/b*100)):0;}
function setStatus(color,txt){document.getElementById('sync-status').innerHTML=`<span class="dot dot-${color}"></span>${txt}`;}

function badgeTipo(t){
  if(!t) return '';
  if(t.includes('Contra')) return `<span class="badge badge-blue">${t}</span>`;
  if(t.includes('Fijar')) return `<span class="badge badge-amber">${t}</span>`;
  return `<span class="badge badge-gray">${t}</span>`;
}

function renderCard(d){
  const total = Number(d.CANTIDADFIJADA)||Number(d.CANTIDADMAX)||0;
  const entregado = Number(d.CANTIDADENTREGADA)||0;
  const liquidado = Number(d.CANTIDADLIQUIDADA)||0;
  const pendiente = Number(d.CANTIDADPENDIENTEENTREGA)||0;
  const pctEnt = pct(entregado,total);
  const pctLiq = pct(liquidado,total);
  const moneda = d.MONEDA==='DOLARES'?'USD':'$';
  const precio = d.PRECIOPROMEDIOFIJADO?`${moneda} ${fmt(d.PRECIOPROMEDIOFIJADO)}/tn`:'A fijar';

  return `<div class="card">
    <div class="card-header">
      <div style="flex:1;min-width:0">
        <div class="card-title">${d.NUMEROINTERNO||d.CONTRATO||'-'} &nbsp;<span style="font-weight:400;color:#888;font-size:12px">${d.NUMERODOCUMENTO||''}</span></div>
        <div class="card-sub">${d.DESCRIPCION||''}</div>
        <div class="badges">
          ${badgeTipo(d.TIPOCONTRATO)}
          <span class="badge badge-green">${d.PRODUCTO||''}</span>
          <span class="badge badge-gray">${d.ORGANIZACION||''}</span>
          <span class="badge badge-gray">${d.COSECHA||''}</span>
        </div>
      </div>
      <div style="text-align:right;white-space:nowrap;flex-shrink:0">
        <div style="font-size:13px;font-weight:600">${moneda} ${fmt(Number(d.IMPORTEFIJADO)||0)}</div>
        <div style="font-size:11px;color:#888">${precio}</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#1B4332;margin-right:4px;vertical-align:middle"></span>Entregado</span>
        <span class="val">${fmt(entregado)} / ${fmt(total)} tn &nbsp;·&nbsp; ${pctEnt}%</span>
      </div>
      <div class="progress-track"><div class="progress-bar bar-ent" style="width:${pctEnt}%"></div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#639922;margin-right:4px;vertical-align:middle"></span>Liquidado</span>
        <span class="val">${fmt(liquidado)} / ${fmt(total)} tn &nbsp;·&nbsp; ${pctLiq}%</span>
      </div>
      <div class="progress-track"><div class="progress-bar bar-liq" style="width:${pctLiq}%"></div></div>
    </div>

    <div class="card-footer">
      <span><i class="ti ti-calendar"></i> ${d.FECHAMINENTREGA||'—'} → ${d.FECHAMAXENTREGA||'—'}</span>
      <span>Pendiente entrega: <strong>${fmt(pendiente)} tn</strong></span>
    </div>
  </div>`;
}

function filtrar(){
  const q=document.getElementById('buscar').value.toLowerCase();
  const prod=document.getElementById('filtroProducto').value;
  const tipo=document.getElementById('filtroTipo').value;
  const mon=document.getElementById('filtroMoneda').value;
  filteredData=allData.filter(d=>{
    const txt=[d.NUMEROINTERNO,d.DESCRIPCION,d.ORGANIZACION,d.CONTRATO,d.NUMERODOCUMENTO].join(' ').toLowerCase();
    if(q&&!txt.includes(q))return false;
    if(prod&&d.PRODUCTO!==prod)return false;
    if(tipo&&d.TIPOCONTRATO!==tipo)return false;
    if(mon&&d.MONEDA!==mon)return false;
    return true;
  });
  renderLista();
}

function renderLista(){
  const el=document.getElementById('contenido');
  if(!filteredData.length){
    el.innerHTML='<div class="no-data">No se encontraron contratos con esos filtros.</div>';
    document.getElementById('contadorInfo').textContent='';
    return;
  }
  el.innerHTML=filteredData.map(renderCard).join('');
  document.getElementById('contadorInfo').textContent=`Mostrando ${filteredData.length} de ${allData.length} contratos`;
}

function renderStats(){
  const totalTn=allData.reduce((s,d)=>s+(Number(d.CANTIDADFIJADA)||Number(d.CANTIDADMAX)||0),0);
  const totalEnt=allData.reduce((s,d)=>s+(Number(d.CANTIDADENTREGADA)||0),0);
  const totalLiq=allData.reduce((s,d)=>s+(Number(d.CANTIDADLIQUIDADA)||0),0);
  const totalPend=allData.reduce((s,d)=>s+(Number(d.CANTIDADPENDIENTEENTREGA)||0),0);
  const pctGlobal=pct(totalEnt,totalTn);
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="label">Contratos</div><div class="value">${allData.length}</div></div>
    <div class="stat"><div class="label">Total contratado</div><div class="value">${fmt(totalTn)} tn</div></div>
    <div class="stat"><div class="label">Entregado</div><div class="value" style="color:#1B4332">${fmt(totalEnt)} tn</div></div>
    <div class="stat"><div class="label">Liquidado</div><div class="value" style="color:#639922">${fmt(totalLiq)} tn</div></div>
    <div class="stat"><div class="label">Pendiente entrega</div><div class="value" style="color:#A32D2D">${fmt(totalPend)} tn</div></div>
    <div class="stat"><div class="label">Cumplimiento global</div><div class="value">${pctGlobal}%</div></div>`;
  document.getElementById('statsBar').style.display='grid';
}

function cargarFiltros(){
  const productos=[...new Set(allData.map(d=>d.PRODUCTO).filter(Boolean))].sort();
  document.getElementById('filtroProducto').innerHTML=
    '<option value="">Todos los productos</option>'+
    productos.map(p=>`<option value="${p}">${p}</option>`).join('');
  document.getElementById('toolbarWrap').style.display='flex';
}

async function cargar(){
  document.getElementById('contenido').innerHTML='<div class="loading"><i class="ti ti-loader"></i> Cargando contratos...</div>';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('toolbarWrap').style.display='none';
  setStatus('amber','Conectando...');
  try{
    const resp=await fetch(PROXY);
    if(!resp.ok) throw new Error(`Error ${resp.status}`);
    const json=await resp.json();
    
    // Array directo o objeto con keys numericas
    allData=Array.isArray(json)?json:Object.values(json).filter(v=>v&&typeof v==='object'&&v.CONTRATO);
    if(!allData.length) throw new Error('La API no devolvió datos');
    filteredData=[...allData];
    setStatus('green','Sincronizado '+new Date().toLocaleTimeString('es-AR'));
    renderStats();
    cargarFiltros();
    renderLista();
  }catch(e){
    setStatus('red','Error de conexión');
    document.getElementById('errorBox').textContent=`No se pudo conectar: ${e.message}`;
    document.getElementById('errorBox').style.display='block';
    document.getElementById('contenido').innerHTML='<div class="no-data">Verificá que el Worker esté activo.</div>';
  }
}

cargar();
</script>
</body>
</html>
